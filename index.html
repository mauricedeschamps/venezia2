    <title>Venezia Travel Guide - Top 12 Attractions</title>
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --gold: #e6c200;
            --text: #f1f1f1;
            --shadow: rgba(0, 0, 0, 0.4);
            --card-bg: #16213e;
            --highlight: #4ecca3;
            --footer-bg: #0d1b2a;
        }

        [data-theme="light"] {
            --primary: #e6f4f1;
            --secondary: #c5e4e6;
            --accent: #a3d2ca;
            --gold: #d4af37;
            --text: #1a1a2e;
            --shadow: rgba(100, 100, 100, 0.2);
            --card-bg: #ffffff;
            --highlight: #4ecca3;
            --footer-bg: #a3d2ca;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            box-shadow: 0 4px 15px var(--shadow);
            border-bottom: 1px solid var(--gold);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            padding: 20px 0;
        }

        footer {
            background: var(--footer-bg);
            text-align: center;
            padding: 25px 20px;
            border-top: 1px solid var(--gold);
        }

        .install-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        
        .install-btn {
            background: var(--gold);
            color: var(--primary);
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .install-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        
        .install-btn.hidden {
            transform: translateY(100px);
            opacity: 0;
            pointer-events: none;
        }

        .offline-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #f44336;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            z-index: 1000;
            display: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        
        .offline-badge.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .title-group {
            flex: 1;
            min-width: 250px;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--gold);
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 400;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px var(--shadow);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px var(--shadow);
        }

        .btn:active {
            transform: translateY(0);
        }

        .theme-btn {
            background: var(--gold);
            color: var(--primary);
        }

        .lang-btn {
            background: var(--highlight);
            color: var(--primary);
        }

        .back-btn {
            background: var(--accent);
            margin: 20px 0;
        }

        .attraction-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .attraction-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(230, 194, 0, 0.2);
        }

        .attraction-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px var(--shadow);
            border-color: var(--gold);
        }

        .card-img {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .card-number {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--gold);
            color: var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 8px var(--shadow);
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--gold);
        }

        .card-subtitle {
            font-style: italic;
            opacity: 0.8;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .card-desc {
            line-height: 1.6;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .detail-page {
            padding: 20px;
        }

        .detail-header {
            margin-bottom: 30px;
        }

        .detail-title {
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .detail-subtitle {
            font-size: 1.4rem;
            opacity: 0.9;
            margin-bottom: 20px;
            font-style: italic;
        }

        .detail-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .detail-content {
                grid-template-columns: 1fr 1fr;
            }
        }

        .detail-img {
            height: 350px;
            border-radius: 15px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px var(--shadow);
        }

        .detail-text {
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .detail-highlight {
            background: rgba(78, 204, 163, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid var(--highlight);
        }

        .official-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: var(--gold);
            color: var(--primary);
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px var(--shadow);
        }

        .official-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px var(--shadow);
        }

        .hidden {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .water-effect {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background: linear-gradient(transparent, rgba(10, 30, 70, 0.3));
            z-index: -1;
        }

        .gondola {
            position: fixed;
            bottom: 20px;
            right: -100px;
            width: 80px;
            height: 40px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50"><path d="M10,25 Q30,5 50,25 Q70,45 90,25 L90,40 L10,40 Z" fill="%2316213e" stroke="%23e6c200" stroke-width="1"/></svg>');
            background-repeat: no-repeat;
            animation: sail 20s linear infinite;
            z-index: -1;
        }

        @keyframes sail {
            0% { right: -100px; transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { right: 100%; transform: translateY(0); }
        }

        /* レスポンシブ調整 */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .controls {
                align-self: flex-end;
                margin-top: 15px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .detail-title {
                font-size: 2rem;
            }
            
            .gondola {
                display: none;
            }
            
            .install-btn {
                padding: 10px 15px;
                font-size: 0.9rem;
                bottom: 15px;
                right: 15px;
            }
        }

        @media (max-width: 480px) {
            .btn {
                padding: 8px 12px;
                font-size: 0.9rem;
            }
            
            .attraction-grid {
                grid-template-columns: 1fr;
            }
            
            .detail-title {
                font-size: 1.8rem;
            }
            
            .install-btn span {
                display: none;
            }
            
            .install-btn::before {
                content: "📱";
                font-size: 1.2rem;
            }
        }

        .contact-text {
            color: var(--gold);
            margin-bottom: 10px;
        }
        .contact-email {
            color: var(--text);
            text-decoration: none;
            border-bottom: 1px dotted var(--gold);
        }
        .contact-email:hover {
            color: var(--gold);
        }
    </style>
</head>

        // === PWA機能 ===
        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('sw.js')
                        .then(registration => console.log('ServiceWorker registered: ', registration.scope))
                        .catch(error => console.log('ServiceWorker registration failed: ', error));
                });
            }
        }
        
        function setupInstallPrompt() {
            const installButton = document.getElementById('install-button');
            const installContainer = document.getElementById('install-container');
            
            installButton.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response to the install prompt: ${outcome}`);
                deferredPrompt = null;
                installContainer.classList.add('hidden');
            });
            
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installContainer.classList.remove('hidden');
            });
            
            window.addEventListener('appinstalled', () => {
                installContainer.classList.add('hidden');
                deferredPrompt = null;
            });
        }
        
        function checkInstallStatus() {
            const installContainer = document.getElementById('install-container');
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
            const isInstalled = window.navigator.standalone;
            if (isStandalone || isInstalled) {
                installContainer.classList.add('hidden');
            }
        }
        
        function monitorNetworkStatus() {
            const offlineBadge = document.getElementById('offline-badge');
            window.addEventListener('online', () => offlineBadge.classList.remove('show'));
            window.addEventListener('offline', () => offlineBadge.classList.add('show'));
            if (!navigator.onLine) offlineBadge.classList.add('show');
        }

        // === アプリ機能 ===
        function toggleTheme() {
            const meta = document.getElementById('theme-color-meta');
            if (appState.currentTheme === 'dark') {
                appState.currentTheme = 'light';
                document.documentElement.setAttribute('data-theme', 'light');
                document.querySelector('#theme-icon').textContent = '🌙';
                document.querySelector('#theme-text').textContent = 'Dark Mode';
                meta.setAttribute('content', '#e6f4f1');
            } else {
                appState.currentTheme = 'dark';
                document.documentElement.removeAttribute('data-theme');
                document.querySelector('#theme-icon').textContent = '☀️';
                document.querySelector('#theme-text').textContent = 'Light Mode';
                meta.setAttribute('content', '#1a1a2e');
            }
        }

        function toggleLanguage() {
            if (appState.currentLanguage === 'en') {
                appState.currentLanguage = 'it';
                document.querySelector('#lang-icon').textContent = '🇬🇧';
                document.querySelector('#lang-text').textContent = 'English';
                document.querySelector('#main-title').textContent = 'Venezia Top 12';
                document.querySelector('#sub-title').textContent = 'Scopri la magia di Venezia';
            } else {
                appState.currentLanguage = 'en';
                document.querySelector('#lang-icon').textContent = '🇮🇹';
                document.querySelector('#lang-text').textContent = 'Italiano';
                document.querySelector('#main-title').textContent = 'Venice Top 12';
                document.querySelector('#sub-title').textContent = 'Discover the magic of Venice';
            }
            renderAttractions();
        }

        function renderAttractions() {
            const container = document.getElementById('attractions-container');
            container.innerHTML = '';
            const data = attractionsData[appState.currentLanguage];
            data.forEach(attraction => {
                const card = document.createElement('div');
                card.className = 'attraction-card fade-in';
                card.innerHTML = `
                    <div class="card-img" style="background-image: url('${attraction.defaultImage}')">
                        <div class="card-number">${attraction.id}</div>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${attraction.title}</h3>
                        <p class="card-subtitle">${attraction.subtitle}</p>
                        <p class="card-desc">${attraction.description}</p>
                    </div>
                `;
                card.addEventListener('click', () => showDetail(attraction.id));
                container.appendChild(card);
            });
        }

        function showDetail(id) {
            const data = attractionsData[appState.currentLanguage].find(item => item.id === id);
            if (!data) return;
            appState.currentAttractionId = id;
            document.getElementById('detail-title').textContent = data.title;
            document.getElementById('detail-subtitle').textContent = data.subtitle;
            document.getElementById('detail-description').textContent = data.description;
            document.getElementById('detail-highlight').textContent = data.highlight;
            document.getElementById('official-link').href = data.officialUrl;
            document.getElementById('detail-image').style.backgroundImage = `url('${data.defaultImage}')`;
            document.getElementById('main-page').classList.add('hidden');
            document.getElementById('detail-page').classList.remove('hidden');
            document.getElementById('detail-page').classList.add('fade-in');
        }

        function goBack() {
            document.getElementById('detail-page').classList.add('hidden');
            document.getElementById('main-page').classList.remove('hidden');
            appState.currentAttractionId = null;
        }

        function setupEventListeners() {
            document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
            document.getElementById('lang-toggle').addEventListener('click', toggleLanguage);
            document.getElementById('back-button').addEventListener('click', goBack);
        }

        // 初期化
        document.addEventListener('DOMContentLoaded', () => {
            renderAttractions();
            setupEventListeners();
            registerServiceWorker();
            setupInstallPrompt();
            checkInstallStatus();
            monitorNetworkStatus();
        });
    </script>
